name: arp-hacking-range8

hosts:
  - name: server
    base_box:
      image: kali
      mgmt_user: debian
      mgmt_protocol: SSH
    flavor: m1.xlarge

  - name: client
    base_box:
      image: kali
      mgmt_user: debian
      mgmt_protocol: SSH
    flavor: m1.xlarge

  - name: home
    base_box:
      image: kali
      mgmt_user: debian
      mgmt_protocol: SSH
    flavor: m1.xlarge

routers:
  - name: home-router
    base_box:
      image: debian-12-x86_64
      mgmt_user: debian
      mgmt_protocol: SSH
    flavor: standard.small

networks:
  - name: home-switch
    cidr: 10.10.30.0/24
    accessible_by_user: true

net_mappings:
  - host: home
    network: home-switch
    ip: 10.10.30.5

  - host: client
    network: home-switch
    ip: 10.10.30.6

  - host: server
    network: home-switch
    ip: 10.10.30.7

router_mappings:
  - router: home-router
    network: home-switch
    ip: 10.10.30.1

groups:
  - name: custom-group
    nodes:
      - home
      - server
      - client
